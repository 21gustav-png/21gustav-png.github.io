<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GUSTAV STORE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2b1055, #7597de);
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      margin-bottom: 5px;
      font-size: 40px;
      letter-spacing: 2px;
    }

    p {
      margin-top: 0;
      opacity: 0.8;
    }

    .card {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      margin-top: 25px;
      display: inline-block;
      width: 90%;
      max-width: 400px;
    }

    .btn {
      display: block;
      margin: 12px 0;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.15);
      transition: 0.3s;
      font-weight: bold;
    }

    .btn:hover {
      background: rgba(255,255,255,0.35);
      transform: scale(1.03);
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>GUSTAV STORE</h1>
    <p>ALL INFO FT / KB</p>

    <div class="card">
      <a class="btn" href="https://instagram.com/" target="_blank">📸 Instagram</a>
      <a class="btn" href="https://wa.me/6283822877405" target="_blank">💬 WhatsApp</a>
      <a class="btn" href="https://t.me/" target="_blank">✈️ Telegram</a>
      <a class="btn" href="#">🎮 Info Event</a>
    </div>

    <footer>
      © 2026 Gustav Store
    </footer>
  </div>
</body>
</html>
